<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪐 Heroku Docs — Документация разработчика</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0b14;
  --bg2: #13101e;
  --bg3: #1a1628;
  --surface: #1e1a2e;
  --surface2: #252038;
  --border: #2d2845;
  --border2: #3d3560;
  --accent: #8b5cf6;
  --accent2: #a78bfa;
  --accent3: #c4b5fd;
  --accent-glow: rgba(139,92,246,0.25);
  --green: #34d399;
  --orange: #fb923c;
  --red: #f87171;
  --blue: #60a5fa;
  --cyan: #22d3ee;
  --text: #e2dff0;
  --text2: #a09bbf;
  --text3: #6b6485;
  --sidebar-w: 280px;
  --header-h: 56px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── Scrollbar ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── Header ─────────────────────────────────────────────────────────────────── */
#header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(13,11,20,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; padding: 0 20px;
  z-index: 200;
}

.header-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
  color: var(--accent2); white-space: nowrap; flex-shrink: 0;
  text-decoration: none;
}
.header-logo span { font-size: 22px; }

.header-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

/* ── Search ─────────────────────────────────────────────────────────────────── */
#search-wrap {
  flex: 1; max-width: 480px; position: relative;
}
#search {
  width: 100%; padding: 8px 16px 8px 40px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
}
#search::placeholder { color: var(--text3); }
#search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); pointer-events: none; font-size: 15px;
}
#search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 12px; overflow: hidden; display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,.5); z-index: 300; max-height: 400px; overflow-y: auto;
}
#search-results.visible { display: block; }
.sr-item {
  padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background .15s; display: flex; flex-direction: column; gap: 3px;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--bg3); }
.sr-item .sr-title { font-size: 13px; font-weight: 500; color: var(--accent2); }
.sr-item .sr-ctx { font-size: 12px; color: var(--text3); }
.sr-item .sr-match { color: var(--text2); font-size: 12px; }
.sr-item mark { background: transparent; color: var(--accent3); font-weight: 600; }
.sr-empty { padding: 20px; text-align: center; color: var(--text3); font-size: 13px; }

/* ── Layout ─────────────────────────────────────────────────────────────────── */
#layout {
  display: flex; padding-top: var(--header-h); min-height: 100vh;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 20px 0 40px;
  transition: transform .3s ease;
}

.sidebar-section { margin-bottom: 6px; }

.chapter-btn {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; background: none; border: none; cursor: pointer;
  color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px;
  font-weight: 500; text-align: left; transition: color .2s, background .2s;
  border-left: 2px solid transparent;
}
.chapter-btn:hover { color: var(--text); background: rgba(139,92,246,.08); }
.chapter-btn.active { color: var(--accent2); border-left-color: var(--accent); background: rgba(139,92,246,.12); }
.chapter-btn .ch-num {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text3); min-width: 22px;
}
.chapter-btn .ch-icon { font-size: 15px; }
.chapter-btn .arrow {
  margin-left: auto; font-size: 10px; color: var(--text3);
  transition: transform .2s;
}
.chapter-btn.open .arrow { transform: rotate(90deg); }

.subchapters {
  display: none; padding: 0 0 4px;
}
.subchapters.open { display: block; }
.subchapter-btn {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 7px 20px 7px 46px; background: none; border: none; cursor: pointer;
  color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 12px;
  text-align: left; transition: color .2s; border-left: 2px solid transparent;
}
.subchapter-btn:hover { color: var(--text2); }
.subchapter-btn.active { color: var(--accent3); border-left-color: var(--accent); }
.subchapter-btn .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
.subchapter-btn.active .dot { background: var(--accent); }

/* ── Content ─────────────────────────────────────────────────────────────────── */
#content {
  flex: 1; margin-left: var(--sidebar-w);
  padding: 60px 64px 120px;
  max-width: calc(100% - var(--sidebar-w));
}

.chapter { display: none; animation: fadeUp .35s ease; }
.chapter.visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Typography ─────────────────────────────────────────────────────────────── */
.chapter-header {
  display: flex; align-items: flex-start; gap: 24px;
  margin-bottom: 48px; padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}
.chapter-header .ch-emoji {
  font-size: 52px; line-height: 1; flex-shrink: 0;
  filter: drop-shadow(0 0 20px var(--accent-glow));
}
.chapter-header h1 {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 38px;
  line-height: 1.1; color: var(--text);
}
.chapter-header .ch-sub {
  font-size: 15px; color: var(--text2); margin-top: 8px; font-weight: 300;
}

h2 {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px;
  color: var(--accent2); margin: 48px 0 16px;
  display: flex; align-items: center; gap: 10px;
}
h2::before { content: ''; display: block; width: 3px; height: 22px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }

h3 {
  font-family: 'Syne', sans-serif; font-weight: 600; font-size: 16px;
  color: var(--text); margin: 32px 0 12px;
}

p { font-size: 15px; color: var(--text2); margin-bottom: 16px; line-height: 1.8; }
p strong { color: var(--text); font-weight: 500; }

/* ── Code ─────────────────────────────────────────────────────────────────── */
code {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  background: var(--surface); color: var(--accent3);
  padding: 2px 7px; border-radius: 5px; border: 1px solid var(--border);
}

/* Code block wrapper — button lives here, NOT inside scrollable pre */
.code-wrap {
  position: relative; margin: 20px 0;
}
.code-wrap::after {
  content: attr(data-lang);
  position: absolute; top: 10px; right: 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text3); text-transform: uppercase; letter-spacing: 1px;
  pointer-events: none;
}

pre {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; overflow-x: auto; margin: 0;
  border-left: 3px solid var(--accent);
}
pre code {
  display: block; padding: 20px 24px; background: none;
  color: var(--text2); font-size: 13px; line-height: 1.8;
  border: none; border-radius: 0; white-space: pre;
}

/* Syntax highlight classes */
.kw { color: #c792ea; }
.fn { color: #82aaff; }
.st { color: #c3e88d; }
.cm { color: #546e7a; font-style: italic; }
.num { color: #f78c6c; }
.dec { color: #ffcb6b; }
.op { color: #89ddff; }
.cls { color: #ffcb6b; }
.self { color: #f07178; }

/* Copy button — anchored to .code-wrap, never scrolls */
.copy-btn {
  position: absolute; top: 8px; right: 56px; z-index: 2;
  padding: 3px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text3); font-size: 11px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.copy-btn.copied { background: var(--green); color: #000; border-color: var(--green); }

/* ── Tables ─────────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; margin: 20px 0; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead tr { background: var(--surface2); }
thead th {
  padding: 12px 16px; text-align: left; color: var(--accent2);
  font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px;
  text-transform: uppercase; letter-spacing: .8px; white-space: nowrap;
}
tbody tr { border-top: 1px solid var(--border); transition: background .15s; }
tbody tr:hover { background: rgba(139,92,246,.05); }
tbody td { padding: 11px 16px; color: var(--text2); vertical-align: top; line-height: 1.6; }
tbody td:first-child { color: var(--text); font-weight: 500; }
tbody td code { font-size: 12px; }

/* ── Callouts ─────────────────────────────────────────────────────────────── */
.callout {
  padding: 16px 20px; border-radius: 10px; margin: 20px 0;
  display: flex; gap: 14px; align-items: flex-start;
  font-size: 14px; line-height: 1.7;
}
.callout .c-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.callout.info { background: rgba(139,92,246,.12); border: 1px solid rgba(139,92,246,.3); }
.callout.warn { background: rgba(251,146,60,.1); border: 1px solid rgba(251,146,60,.3); color: #fbd38d; }
.callout.danger { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: #fca5a5; }
.callout.ok { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.3); color: #6ee7b7; }

/* ── Tag grid ─────────────────────────────────────────────────────────────── */
.tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
.tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  font-family: 'JetBrains Mono', monospace; border: 1px solid;
}
.tag.purple { background: rgba(139,92,246,.15); border-color: rgba(139,92,246,.4); color: var(--accent3); }
.tag.green  { background: rgba(52,211,153,.12); border-color: rgba(52,211,153,.35); color: var(--green); }
.tag.blue   { background: rgba(96,165,250,.12); border-color: rgba(96,165,250,.35); color: var(--blue); }
.tag.orange { background: rgba(251,146,60,.12); border-color: rgba(251,146,60,.35); color: var(--orange); }

/* ── Hero (home) ─────────────────────────────────────────────────────────── */
.hero {
  text-align: center; padding: 40px 20px 60px;
}
.hero-glyph {
  font-size: 80px; display: block; margin-bottom: 24px;
  filter: drop-shadow(0 0 40px rgba(139,92,246,.6));
  animation: pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { filter: drop-shadow(0 0 30px rgba(139,92,246,.5)); }
  50%      { filter: drop-shadow(0 0 60px rgba(139,92,246,.9)); }
}
.hero h1 {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px;
  background: linear-gradient(135deg, #c4b5fd, #818cf8, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 12px;
}
.hero p { font-size: 17px; color: var(--text2); max-width: 520px; margin: 0 auto 32px; }
.hero-chips { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.hero-chip {
  padding: 8px 18px; border-radius: 30px; font-size: 13px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}
.hero-chip span { color: var(--accent2); }

.chapter-cards {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 16px; margin-top: 48px;
}
.ch-card {
  padding: 20px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; cursor: pointer; transition: all .2s;
  display: flex; flex-direction: column; gap: 8px;
}
.ch-card:hover {
  border-color: var(--accent); transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(139,92,246,.2);
}
.ch-card .card-icon { font-size: 28px; }
.ch-card .card-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }
.ch-card .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); }
.ch-card .card-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }

/* ── Mobile toggle ─────────────────────────────────────────────────────────── */
#menu-toggle {
  display: none; background: none; border: none; color: var(--text);
  font-size: 22px; cursor: pointer; flex-shrink: 0;
}
#sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 150;
}
#sidebar-overlay.visible { display: block; }

/* ── Mobile search toggle button ────────────────────────────────────────────── */
#search-toggle {
  display: none;
  background: none; border: none; color: var(--text2);
  font-size: 20px; cursor: pointer; flex-shrink: 0;
  width: 36px; height: 36px; align-items: center; justify-content: center;
  border-radius: 8px; transition: background .2s, color .2s;
}
#search-toggle:hover { background: var(--surface); color: var(--accent2); }

/* Mobile search bar — slides down from header */
#mobile-search-bar {
  display: none;
  position: fixed; top: var(--header-h); left: 0; right: 0;
  background: rgba(13,11,20,0.97);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  z-index: 199;
  transform: translateY(-100%);
  opacity: 0;
  transition: transform .25s cubic-bezier(.4,0,.2,1), opacity .25s ease;
}
#mobile-search-bar.open {
  transform: translateY(0);
  opacity: 1;
}
#mobile-search-wrap {
  position: relative; width: 100%;
}
#mobile-search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); pointer-events: none; font-size: 15px;
}
#mobile-search-input {
  width: 100%; padding: 10px 16px 10px 40px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 15px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#mobile-search-input::placeholder { color: var(--text3); }
#mobile-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
#mobile-search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 12px; overflow: hidden; display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,.6); z-index: 300;
  max-height: 55vh; overflow-y: auto;
}
#mobile-search-results.visible { display: block; }

@media (max-width: 900px) {
  :root { --sidebar-w: 270px; }
  #menu-toggle { display: flex; align-items: center; }
  #sidebar {
    transform: translateX(-100%); z-index: 160;
    top: 0; padding-top: calc(var(--header-h) + 20px);
  }
  #sidebar.open { transform: translateX(0); }
  #content { margin-left: 0; max-width: 100%; padding: 40px 24px 80px; }

  /* Hide desktop search, show icon button */
  #search-wrap { display: none; }
  #header-sep { display: none; }
  #search-toggle { display: flex; }
  #mobile-search-bar { display: block; }
}
@media (max-width: 600px) {
  .chapter-header h1 { font-size: 26px; }
  .chapter-header .ch-emoji { font-size: 36px; }
  #content { padding: 32px 16px 80px; }
}

/* ── Section tabs (sidebar) ─────────────────────────────────────────────────── */
.section-tabs {
  display: flex; gap: 6px; padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border); margin-bottom: 6px;
}
.section-tab {
  flex: 1; padding: 7px 4px; border-radius: 8px; border: none; cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: .03em; transition: background .18s, color .18s;
  background: var(--surface); color: var(--text3);
}
.section-tab:hover { background: var(--surface2); color: var(--text2); }
.section-tab.active { background: var(--accent); color: #fff; }
.section-tab.active-tl { background: var(--cyan); color: #0d0b14; }

/* ── Section header label inside sidebar ────────────────────────────────────── */
.sidebar-section-label {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px 6px; font-size: 10px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text3);
  user-select: none;
}
.sidebar-section-label::before {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.sidebar-section-label.tl { color: var(--cyan); }
.sidebar-section-label.tl::after {
  content: ''; flex: 1; height: 1px; background: color-mix(in srgb, var(--cyan) 30%, transparent);
}

/* ── Section filter: hide chapters of inactive section ──────────────────────── */
.sidebar-section.hidden { display: none; }

/* ── Home page: two-column section layout ───────────────────────────────────── */
.section-split {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 40px;
}
@media (max-width: 700px) { .section-split { grid-template-columns: 1fr; } }

.section-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.section-block-head {
  padding: 18px 20px 14px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.section-block-head .sb-icon { font-size: 26px; }
.section-block-head .sb-title {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
}
.section-block-head .sb-badge {
  margin-left: auto; font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; letter-spacing: .04em;
}
.section-block.heroku .section-block-head { background: linear-gradient(135deg, rgba(139,92,246,.12), transparent); }
.section-block.heroku .sb-title { color: var(--accent2); }
.section-block.heroku .sb-badge { background: rgba(139,92,246,.2); color: var(--accent3); }
.section-block.herokutl .section-block-head { background: linear-gradient(135deg, rgba(34,211,238,.10), transparent); }
.section-block.herokutl .sb-title { color: var(--cyan); }
.section-block.herokutl .sb-badge { background: rgba(34,211,238,.15); color: var(--cyan); }

.section-block .ch-card-list { padding: 8px 0; }
.section-ch-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; cursor: pointer; transition: background .15s;
  font-size: 13.5px;
}
.section-ch-item:hover { background: var(--surface2); }
.section-ch-item .sci-num {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text3); min-width: 22px;
}
.section-ch-item .sci-icon { font-size: 15px; }
.section-ch-item .sci-title { color: var(--text2); }
.section-ch-item .sci-desc { font-size: 11px; color: var(--text3); display: block; }

/* ── Active section indicator in header ─────────────────────────────────────── */
#section-indicator {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); transition: all .2s; white-space: nowrap; flex-shrink: 0;
}
#section-indicator.tl { background: rgba(34,211,238,.12); border-color: rgba(34,211,238,.3); color: var(--cyan); }

</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header id="header">
  <button id="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
  <a class="header-logo" href="#" onclick="showHome(); return false;">
    <span>🪐</span> Heroku Docs
  </a>
  <div class="header-sep" id="header-sep"></div>
  <div id="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="search" placeholder="Поиск по документации..." autocomplete="off">

        <div class="ch-emoji">📋</div>
        <div><h1>Полный пример</h1><p class="ch-sub">Модуль с командами, конфигом, inline-формой, циклом и новыми паттернами</p></div>
      </div>

      <h2 id="ch11s1">Исходный код</h2>
      <pre data-lang="python"><button class="copy-btn" onclick="copyCode(this)">copy</button><code># meta developer: @myusername
# requires: aiohttp

from .. import loader, utils
from herokutl.tl.types import Message
import aiohttp


@loader.tds
class ExampleMod(loader.Module):
    """Пример модуля с основными паттернами"""

    strings = {
        "name": "Example",
        "_cls_doc": "Пример модуля с основными паттернами",
        "no_args":  "❌ Укажите аргументы",
        "result":   "✅ Результат: &lt;code&gt;{}&lt;/code&gt;",
        "counter":  "🔢 Счётчик: &lt;b&gt;{}&lt;/b&gt;",
        "cfg_prefix": "Текст перед результатом",
    }

    strings_ru = {
        "no_args":  "❌ Укажи аргументы",
        "result":   "✅ Результат: &lt;code&gt;{}&lt;/code&gt;",
        "cfg_prefix": "Текст перед результатом",
    }

    def __init__(self):
        self.config = loader.ModuleConfig(
            loader.ConfigValue(
                "prefix_text",
                "Result",
                lambda: self.strings["cfg_prefix"],
                validator=loader.validators.String(max_len=50),
                on_change=self._on_prefix_change,
                folder="Основное",
            ),
            loader.ConfigValue(
                "auto_count",
                True,
                "Считать все сообщения",
                validator=loader.validators.Boolean(),
            ),
            loader.ConfigValue(
                "secret_key",
                "",
                "Секретный ключ API",
                validator=loader.validators.Hidden(loader.validators.String(min_len=8)),
                folder="Безопасность",
            ),
        )

    async def client_ready(self):
        # self.get/set — короткая запись через имя класса
        if not self.get("counter"):
            self.set("counter", 0)

    async def on_dlmod(self):
        # Вызывается только при первой загрузке через .dlmod
        await self._client.send_message("me", "Модуль Example загружен!")

    def _on_prefix_change(self):
        # Синхронный callback при изменении конфига
        self._prefix = self.config["prefix_text"]

    @loader.command()
    async def examplecmd(self, message: Message):
        """Пример команды с inline-формой"""
        args = utils.get_args_raw(message)
        if not args:
            return await utils.answer(message, self.strings["no_args"])

        await self.inline.form(
            message=message,
            text=self.strings["result"].format(
                f"{self.config['prefix_text']}: {args}"
            ),
            reply_markup=[
                [
                    {"text": "📋 Скопировать", "copy": args},
                    {"text": "🔄 Повторить", "callback": self._cb_repeat, "args": (args,)},
                ],
                [{"text": "❌ Закрыть", "action": "close"}],
            ],
            silent=True,
        )

    @loader.inline_handler()
    async def _cb_repeat(self, call, text: str):
        await call.answer(f"Повтор: {text}", show_alert=True)

    @loader.watcher("only_messages", "no_commands", "out")
    async def watcher(self, message: Message):
        if self.config["auto_count"]:
            cnt = self.get("counter", 0) + 1
            self.set("counter", cnt)

    @loader.command()
    async def countcmd(self, message: Message):
        """Показать счётчик сообщений"""
        await utils.answer(
            message,
            self.strings["counter"].format(self.get("counter", 0)),
        )

    @loader.loop(interval=300, autostart=True)
    async def cleanup_loop(self):
        # Периодически сбрасывать счётчик (каждые 5 минут)
        self.set("counter", 0)

    @loader.command()
    async def animcmd(self, message: Message):
        """Анимация загрузки"""
        await self.animate(
            message,
            frames=["⠋ Загрузка", "⠙ Загрузка", "⠹ Загрузка", "⠸ Загрузка"],
            interval=0.2,
        )</code></pre>`

          <tr><td><code>await self.invoke(command, args?, message?, peer?, edit?)</code></td><td>Программно вызвать другую команду</td></tr>

          <tr><td><code>await self.import_lib(url, suspend_on_error?)</code></td><td>Загрузить внешнюю библиотеку по URL</td></tr>

      <h2 id="ch14s3">Library — методы</h2>
      <p>Внешние библиотеки наследуются от <code>loader.Library</code>. Класс должен заканчиваться на <code>Lib</code>.</p>

      <h2 id="ch15s4">Sync/Async дуальность</h2>
      <p>Модуль <code>herokutl.sync</code> при импорте оборачивает все публичные async-методы: если event loop не запущен — метод выполняется синхронно через <code>loop.run_until_complete()</code>; если запущен — возвращает coroutine. Это позволяет использовать клиент и в sync-скриптах, и в async-коде без изменений.</p>
      <pre data-lang="python"><button class="copy-btn" onclick="copyCode(this)">copy</button><code># sync-скрипт (loop не запущен)
from herokutl.sync import TelegramClient
with TelegramClient('session', api_id, api_hash) as client:
    print(client.get_me())           # без await!

# async-код (loop запущен)
from herokutl import TelegramClient
async def main():
    async with TelegramClient('session', api_id, api_hash) as client:
        print(await client.get_me())  # с await</code></pre>
      <div class="callout callout-blue">В Heroku-userbot всегда async-контекст. Используй <code>await</code>.</div>

      <h2 id="ch15s5">TotalList и RequestIter</h2>
      <p><code>TotalList</code> — обычный list с атрибутом <code>.total</code> (общее количество на сервере, даже если получено меньше). Возвращается из <code>get_messages()</code>, <code>get_participants()</code> и т.д.</p>
      <p><code>RequestIter</code> — абстрактный базовый класс для всех пагинированных итераторов. Поддерживает <code>async for</code> и синхронный <code>for</code>, метод <code>.collect()</code> → TotalList, параметр <code>wait_time</code> — задержка между запросами, <code>reverse</code> — обратный порядок.</p>
      <pre data-lang="python"><button class="copy-btn" onclick="copyCode(this)">copy</button><code>msgs = await client.get_messages(chat, limit=50)
print(msgs.total)   # например 12847 — всего в чате
print(len(msgs))    # 50 — получено сейчас

# collect() собирает итератор в TotalList
all_users = await client.iter_participants(chat).collect()

let current = 'home';

function buildSidebar() {
  const nav = document.getElementById('sidebar');

  const tabs = `<div class="section-tabs">
    <button class="section-tab active" id="tab-heroku" onclick="switchSection('heroku')">🪐 Heroku</button>
    <button class="section-tab" id="tab-herokutl" onclick="switchSection('herokutl')">📡 herokutl</button>
  </div>`;

  const items = DOCS.map(ch => {
    // Home button (no section)
    if (!ch.section) return `
    <div class="sidebar-section" data-section="home">
      <button class="chapter-btn${ch.id==='home'?' active':''}" id="btn-${ch.id}"
        onclick="navigate('${ch.id}')">
        <span class="ch-icon">${ch.icon}</span>
        <span>${ch.title}</span>
      </button>
    </div>`;

    return `
    <div class="sidebar-section" data-section="${ch.section}">
      <button class="chapter-btn" id="btn-${ch.id}"
        onclick="navigate('${ch.id}')">
        <span class="ch-num">${ch.num}.</span>
        <span class="ch-icon">${ch.icon}</span>
        <span>${ch.title}</span>
        ${ch.sub && ch.sub.length ? '<span class="arrow">▶</span>' : ''}
      </button>
      ${ch.sub && ch.sub.length ? `
        <div class="subchapters" id="sub-${ch.id}">
          ${ch.sub.map(s => `
            <button class="subchapter-btn" id="btn-${s.id}" onclick="scrollToSection('${s.id}')">
              <span class="dot"></span>${s.title}
            </button>`).join('')}
        </div>` : ''}
    </div>`;
  }).join('');

  nav.innerHTML = tabs + items;
  applySectionFilter();
}

function switchSection(sec) {
  activeSection = sec;
  document.getElementById('tab-heroku').className = 'section-tab' + (sec==='heroku' ? ' active' : '');
  document.getElementById('tab-herokutl').className = 'section-tab' + (sec==='herokutl' ? ' active-tl' : '');
  const ind = document.getElementById('section-indicator');
  if (sec === 'heroku') {
    ind.textContent = '🪐 Heroku'; ind.className = '';
    ind.id = 'section-indicator';
  } else {
    ind.textContent = '📡 herokutl'; ind.id = 'section-indicator';
    ind.classList.add('tl');
  }
  applySectionFilter();
}

function applySectionFilter() {
  document.querySelectorAll('.sidebar-section[data-section]').forEach(el => {
    const s = el.getAttribute('data-section');
    if (s === 'home') { el.classList.remove('hidden'); return; }
    el.classList.toggle('hidden', s !== activeSection);
  });
}

function buildContent() {
  const main = document.getElementById('content');
  main.innerHTML = DOCS.map(ch => `
    <div class="chapter" id="chapter-${ch.id}">${ch.content()}</div>`).join('');
}

function navigate(id) {
  // Hide all
  document.querySelectorAll('.chapter').forEach(c => c.classList.remove('visible'));
  document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active', 'open'));
  document.querySelectorAll('.subchapters').forEach(s => s.classList.remove('open'));
  document.querySelectorAll('.subchapter-btn').forEach(b => b.classList.remove('active'));

  // Show target
  const ch = document.getElementById('chapter-' + id);
  if (ch) { ch.classList.add('visible'); window.scrollTo(0,0); }

  const btn = document.getElementById('btn-' + id);
  if (btn) { btn.classList.add('active', 'open'); }

  const sub = document.getElementById('sub-' + id);
  if (sub) sub.classList.add('open');

  // Auto-switch sidebar section to match chapter
  const chData = DOCS.find(d => d.id === id);
  if (chData && chData.section && chData.section !== activeSection) {
    switchSection(chData.section);
  }

  current = id;
  closeSidebar();
  closeMobileSearch();
  setTimeout(wrapCodeBlocks, 30);
}

function showHome() { navigate('home'); }

function navigateTo(id, section) {
  switchSection(section);
  navigate(id);
}

function scrollToSection(subId) {
  const el = document.getElementById(subId);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Highlight sub button
    document.querySelectorAll('.subchapter-btn').forEach(b => b.classList.remove('active'));
    const sb = document.getElementById('btn-' + subId);
    if (sb) sb.classList.add('active');
  }
  closeSidebar();
}

function buildSearchIndex() {
  const index = [];
  DOCS.forEach(ch => {
    if (ch.noNum) return;
    const html = ch.content();
    const text = html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    // Split into paragraphs
    const chunks = text.split(/(?<=\.)(?=\s+[A-ZА-ЯЁ\d])/g).map(s => s.trim()).filter(s => s.length > 20);
    chunks.forEach(chunk => {
      index.push({ chId: ch.id, chTitle: ch.title, chIcon: ch.icon, text: chunk.slice(0, 200) });
    });
    (ch.sub || []).forEach(s => {
      index.push({ chId: ch.id, subId: s.id, chTitle: ch.title, chIcon: ch.icon, subTitle: s.title, text: s.title });
    });
  });
  return index;
}

let searchIndex = [];

// MOBILE SEARCH TOGGLE
// ═══════════════════════════════════════════════════════════════════════════════
let mobileSearchOpen = false;

function toggleMobileSearch() {
  mobileSearchOpen = !mobileSearchOpen;
  const bar = document.getElementById('mobile-search-bar');
  const btn = document.getElementById('search-toggle');
  const inp = document.getElementById('mobile-search-input');
  if (mobileSearchOpen) {
    bar.classList.add('open');
    btn.textContent = '✕';
    btn.style.color = 'var(--accent2)';
    setTimeout(() => inp.focus(), 260);
  } else {
    bar.classList.remove('open');
    btn.textContent = '🔍';
    btn.style.color = '';
    inp.value = '';
    document.getElementById('mobile-search-results').classList.remove('visible');
    document.getElementById('mobile-search-results').innerHTML = '';
  }
}

function closeMobileSearch() {
  if (!mobileSearchOpen) return;
  mobileSearchOpen = false;
  document.getElementById('mobile-search-bar').classList.remove('open');
  const btn = document.getElementById('search-toggle');
  btn.textContent = '🔍';
  btn.style.color = '';
  document.getElementById('mobile-search-input').value = '';
  document.getElementById('mobile-search-results').classList.remove('visible');
  document.getElementById('mobile-search-results').innerHTML = '';
}

function initSearch() {
  searchIndex = buildSearchIndex();
  const inp = document.getElementById('search');
  const res = document.getElementById('search-results');

  inp.addEventListener('input', () => {
    const q = inp.value.trim().toLowerCase();
    if (q.length < 2) { res.classList.remove('visible'); return; }

    const matches = [];
    const seen = new Set();
    searchIndex.forEach(item => {
      if (item.text.toLowerCase().includes(q) || (item.subTitle||'').toLowerCase().includes(q)) {
        const key = item.chId + (item.subId||'');
        if (!seen.has(key)) {
          seen.add(key);
          matches.push(item);
        }
      }
    });

    if (!matches.length) {
      res.innerHTML = `<div class="sr-empty">Ничего не найдено по запросу «${inp.value}»</div>`;
    } else {
      res.innerHTML = matches.slice(0,10).map(m => {
        const hi = (str) => str.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), '<mark>$&</mark>');
        return `<div class="sr-item" onclick="goSearch('${m.chId}','${m.subId||''}')">
          <div class="sr-title">${m.chIcon} ${hi(m.subTitle || m.chTitle)}</div>
          ${m.subTitle ? `<div class="sr-ctx">Глава ${DOCS.find(d=>d.id===m.chId)?.num}: ${m.chTitle}</div>` : ''}
          <div class="sr-match">${hi(m.text.slice(0,100))}…</div>
        </div>`;
      }).join('');
    }
    res.classList.add('visible');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-wrap')) res.classList.remove('visible');
  });

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { res.classList.remove('visible'); inp.blur(); }
  });

  // ── Mobile search wiring ──────────────────────────────────────────────────
  const mInp = document.getElementById('mobile-search-input');
  const mRes = document.getElementById('mobile-search-results');

  mInp.addEventListener('input', () => {
    const q = mInp.value.trim().toLowerCase();
    if (q.length < 2) { mRes.classList.remove('visible'); mRes.innerHTML = ''; return; }

    const matches = [];
    const seen = new Set();
    searchIndex.forEach(item => {
      if (item.text.toLowerCase().includes(q) || (item.subTitle||'').toLowerCase().includes(q)) {
        const key = item.chId + (item.subId||'');
        if (!seen.has(key)) { seen.add(key); matches.push(item); }
      }
    });

    const hi = (str) => str.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), '<mark>$&</mark>');

    if (!matches.length) {
      mRes.innerHTML = `<div class="sr-empty">Ничего не найдено по запросу «${mInp.value}»</div>`;
    } else {
      mRes.innerHTML = matches.slice(0,8).map(m => `
        <div class="sr-item" onclick="goSearch('${m.chId}','${m.subId||''}'); closeMobileSearch();">
          <div class="sr-title">${m.chIcon} ${hi(m.subTitle || m.chTitle)}</div>
          ${m.subTitle ? `<div class="sr-ctx">Глава ${DOCS.find(d=>d.id===m.chId)?.num}: ${m.chTitle}</div>` : ''}
          <div class="sr-match">${hi(m.text.slice(0,100))}…</div>
        </div>`).join('');
    }
    mRes.classList.add('visible');
  });

  mInp.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeMobileSearch(); }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#mobile-search-bar') && !e.target.closest('#search-toggle')) {
      if (mobileSearchOpen) closeMobileSearch();
    }
  });
}

function goSearch(chId, subId) {
  navigate(chId);
  document.getElementById('search-results').classList.remove('visible');
  document.getElementById('search').value = '';
  if (subId) {
    setTimeout(() => scrollToSection(subId), 200);
  }
}

function copyCode(btn) {
  const code = btn.nextElementSibling;
  const text = code ? code.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function initScrollSpy() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll('.subchapter-btn').forEach(b => {
          b.classList.toggle('active', b.id === 'btn-' + id);
        });
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });

  DOCS.forEach(ch => {
    (ch.sub||[]).forEach(s => {
      const el = document.getElementById(s.id);
      if (el) observer.observe(el);
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// WRAP CODE BLOCKS — move copy-btn outside scrollable <pre>
// ═══════════════════════════════════════════════════════════════════════════════
function wrapCodeBlocks() {
  document.querySelectorAll('pre').forEach(pre => {
    if (pre.closest('.code-wrap')) return;
    const btn = pre.querySelector('.copy-btn');
    const lang = pre.getAttribute('data-lang') || '';
    const wrap = document.createElement('div');
    wrap.className = 'code-wrap';
    if (lang) wrap.setAttribute('data-lang', lang);
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    if (btn) { pre.removeChild(btn); wrap.appendChild(btn); }
    pre.removeAttribute('data-lang');
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  buildContent();
  navigate('home');
  initSearch();
  setTimeout(initScrollSpy, 300);
  setTimeout(wrapCodeBlocks, 50);

  // Keyboard shortcut: Ctrl+K / Cmd+K to focus search
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('search').focus();
    }
  });
});
</script>
